<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Uygulaması</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- AUTH EKRANI -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <h1>Todo Uygulaması</h1>

      <!-- Giriş / Kayıt sekmeler -->
      <div class="auth-tabs" id="authTabs">
        <button class="auth-tab active" data-tab="login">Giriş Yap</button>
        <button class="auth-tab" data-tab="register">Kayıt Ol</button>
      </div>

      <!-- Giriş Formu -->
      <form id="loginForm" class="auth-form">
        <label>E-posta</label>
        <input type="email" id="loginEmail" placeholder="ornek@mail.com" required />
        <label>Şifre</label>
        <input type="password" id="loginPassword" placeholder="••••••" required />
        <button type="submit" class="auth-btn">Giriş Yap</button>
        <p class="auth-msg" id="loginMsg"></p>
      </form>

      <!-- Kayıt Formu -->
      <form id="registerForm" class="auth-form hidden">
        <label>E-posta</label>
        <input type="email" id="regEmail" placeholder="ornek@mail.com" required />
        <label>Şifre</label>
        <input type="password" id="regPassword" placeholder="En az 6 karakter" required />
        <button type="submit" class="auth-btn">Kayıt Ol</button>
        <p class="auth-msg" id="registerMsg"></p>
      </form>

      <!-- OTP Doğrulama -->
      <form id="otpForm" class="auth-form hidden">
        <p class="otp-info" id="otpInfo"></p>
        <label>Doğrulama Kodu</label>
        <input type="text" id="otpInput" placeholder="6 haneli kod" maxlength="6" inputmode="numeric" required />
        <button type="submit" class="auth-btn">Doğrula</button>
        <button type="button" class="auth-btn-secondary" id="resendBtn">Kodu Tekrar Gönder</button>
        <p class="auth-msg" id="otpMsg"></p>
      </form>
    </div>
  </div>

  <!-- TODO EKRANI -->
  <div id="appScreen" class="hidden">
    <div class="container">
      <div class="app-header">
        <h1>Yapılacaklar</h1>
        <div class="user-info">
          <span id="userEmail"></span>
          <button id="logoutBtn">Çıkış</button>
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="todoInput" placeholder="Yeni görev ekle..." />
        <button id="addBtn">Ekle</button>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">Tümü</button>
        <button class="filter-btn" data-filter="active">Aktif</button>
        <button class="filter-btn" data-filter="done">Tamamlanan</button>
      </div>

      <ul id="todoList"></ul>

      <div class="footer">
        <span id="remaining">0 görev kaldı</span>
        <button id="clearDone">Tamamlananları Sil</button>
      </div>
    </div>
  </div>

  <script src="auth.js"></script>
  <script src="app.js"></script>
</body>
</html>
